
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic GPA Dashboard</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Canvas Confetti for Celebration! -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f1f5f9; /* Light slate background */
    }
    
    .font-serif {
      font-family: 'Playfair Display', serif;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* Certificate Decorative Borders */
    .certificate-border {
      border: 8px solid #cbd5e1;
      position: relative;
      background: #ffffff;
    }
    .certificate-inner {
      border: 2px solid #94a3b8;
      height: 100%;
      padding: 1.5rem;
      transition: all 0.5s ease;
    }

    /* Highest Honors Mode */
    .certificate-honors {
      border-color: #fbbf24 !important; /* Gold Border */
      box-shadow: 0 0 40px rgba(251, 191, 36, 0.4), inset 0 0 20px rgba(251, 191, 36, 0.1) !important; /* Gold Glow */
      background: linear-gradient(135deg, #ffffff 0%, #fffbeb 100%) !important;
    }
    .certificate-honors .certificate-inner {
      border-color: #f59e0b !important;
    }

    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="text-slate-800 pb-12">

  <header class="bg-slate-900 text-white py-8 mb-8 border-b-4 border-yellow-500 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 flex flex-col md:flex-row items-center justify-between gap-6">
      <div class="flex items-center gap-5">
        <div class="bg-slate-800 p-4 rounded-full border border-slate-700 shadow-inner">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-yellow-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/></svg>
        </div>
        <div>
          <h1 class="text-3xl font-serif font-bold tracking-tight text-white">Academic GPA Dashboard</h1>
          <p class="text-yellow-500 text-sm font-medium tracking-widest uppercase mt-1">Official University Scale Engine</p>
        </div>
      </div>

      <!-- Student Profile -->
      <div class="bg-slate-800 rounded-xl p-3 border border-slate-700 flex flex-col gap-2 min-w-[280px] sm:min-w-[420px]">
        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Student Profile</label>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
          <input type="text" id="studentName" placeholder="Enter Your Name..." oninput="updateName(); saveData();" class="w-full bg-slate-900 border border-slate-700 text-white rounded-lg px-3 py-2 text-sm font-semibold focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 outline-none transition-all placeholder-slate-500">
          <input type="text" id="studentRank" placeholder="Rank (e.g. Top 10%)..." oninput="updateRank(); saveData();" class="w-full bg-slate-900 border border-slate-700 text-white rounded-lg px-3 py-2 text-sm font-semibold focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 outline-none transition-all placeholder-slate-500">
          <input type="text" id="studentUniversity" placeholder="University (e.g. MUST)..." oninput="updateUniversity(); saveData();" class="w-full bg-slate-900 border border-slate-700 text-white rounded-lg px-3 py-2 text-sm font-semibold focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 outline-none transition-all placeholder-slate-500">
          <input type="text" id="studentCollege" placeholder="Degree (e.g. B.Sc in IT)..." oninput="updateCollege(); saveData();" class="w-full bg-slate-900 border border-slate-700 text-white rounded-lg px-3 py-2 text-sm font-semibold focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 outline-none transition-all placeholder-slate-500">
        </div>
      </div>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-4 sm:px-6">
    <div class="flex flex-col lg:grid lg:grid-cols-12 gap-8">
      
      <div class="lg:col-span-8 space-y-6">
        
        <!-- Courses Section -->
        <div class="bg-white rounded-2xl p-5 sm:p-7 shadow-sm border border-slate-200">
          <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6 pb-4 border-b border-slate-100">
            <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
              Current Semester Courses
            </h2>
            <div class="flex flex-col sm:flex-row gap-3">
              <div class="relative">
                <select id="scaleSelector" onchange="changeScale(this.value)" class="appearance-none bg-blue-50 border border-blue-200 text-blue-800 text-sm rounded-xl pl-4 pr-10 py-2.5 font-bold focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer w-full">
                  <option value="standard">Standard Scale (Nursing, Business, IT)</option>
                  <option value="dentistry">Dentistry Scale (Starts D=2.0)</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-blue-800">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
              </div>
              <button onclick="addCourse()" class="bg-slate-900 text-white hover:bg-slate-800 px-5 py-2.5 rounded-xl text-sm font-bold transition-colors flex items-center justify-center gap-2 shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Add Course
              </button>
            </div>
          </div>

          <div class="hidden sm:grid grid-cols-12 gap-3 text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 px-2">
            <div class="col-span-3">Course Name</div>
            <div class="col-span-2 text-center">Credits</div>
            <div class="col-span-2 text-center">Score (%)</div>
            <div class="col-span-3 text-center">Grade</div>
            <div class="col-span-2 text-center">Include</div>
          </div>

          <div id="coursesList" class="space-y-3">
            <!-- Courses injected by JS -->
          </div>
        </div>

        <div class="bg-white rounded-2xl p-5 sm:p-7 shadow-sm border border-slate-200">
          <h2 class="text-lg font-bold text-slate-800 mb-5 flex items-center gap-2">
            Cumulative Data 
            <span class="text-xs bg-slate-100 text-slate-500 px-2.5 py-1 rounded-md font-medium tracking-wide">Optional</span>
          </h2>
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
            <div>
              <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Previous Cum. GPA</label>
              <input type="number" id="prevGpa" step="0.01" placeholder="e.g. 3.45" oninput="saveData(); calculate();" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all">
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Previous Cum. Score (%)</label>
              <input type="number" id="prevPct" step="0.01" placeholder="e.g. 88.5" oninput="saveData(); calculate();" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all">
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Previous Credits</label>
              <input type="number" id="prevCredits" placeholder="e.g. 64" oninput="saveData(); calculate();" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all">
            </div>
          </div>
        </div>

      </div>

      <div class="lg:col-span-4">
        
        <!-- Certificate Style Results Panel -->
        <div id="certBorder" class="certificate-border shadow-xl transition-all duration-500">
          <div id="certInner" class="certificate-inner flex flex-col items-center text-center">
            
            <!-- University Name (Top of Certificate) -->
            <div id="certUniversityText" class="hidden font-serif text-lg md:text-xl font-bold text-slate-800 mb-4 tracking-wide transition-all fade-in"></div>

            <div class="w-16 h-16 bg-slate-900 rounded-full flex items-center justify-center mb-4 border-4 border-yellow-500 shadow-md relative group">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-yellow-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15l-2 5l9-5l-9-5l2 5z" opacity="0.3"/><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3l-5 3l1.523-9.11"/></svg>
            </div>

            <h2 id="standingText" class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 transition-colors duration-300">Academic Standing</h2>
            
            <div class="flex flex-col items-center justify-center mb-6 min-h-[32px]">
              <div id="certName" class="font-serif text-2xl font-bold text-slate-900">Student Name</div>
              <!-- College / Degree Name -->
              <div id="certCollegeText" class="hidden mt-1 text-sm font-semibold text-slate-500 transition-all fade-in"></div>
              <!-- Rank Badge -->
              <div id="certRankText" class="hidden mt-3 bg-slate-900 text-yellow-500 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest shadow-sm border border-slate-700 transition-all fade-in"></div>
            </div>
              
              <div class="w-full space-y-6">
                <!-- Semester Block -->
                <div class="bg-slate-50 rounded-xl p-4 border border-slate-200 relative overflow-hidden">
                  <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
                  <div class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-2 text-left ml-2">Current Semester</div>
                  <div class="grid grid-cols-2 gap-4 text-left ml-2">
                    <div>
                      <div class="text-[10px] text-slate-400 font-semibold uppercase">GPA</div>
                      <div id="semGpa" class="text-3xl font-black text-slate-900 tracking-tight">0.00</div>
                    </div>
                    <div>
                      <div class="text-[10px] text-slate-400 font-semibold uppercase">Score</div>
                      <div id="semPct" class="text-xl font-bold text-blue-600 mt-1.5 tracking-tight">0.00%</div>
                    </div>
                  </div>
                  <div id="semCredits" class="text-left ml-2 text-slate-400 text-[10px] mt-2 font-medium">Based on 0 Credits</div>
                </div>

                <!-- Cumulative Block -->
                <div class="bg-slate-900 rounded-xl p-4 border border-slate-800 relative overflow-hidden text-white shadow-lg">
                  <div class="absolute top-0 left-0 w-1 h-full bg-yellow-500"></div>
                  <div class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-2 text-left ml-2">Cumulative Total</div>
                  <div class="grid grid-cols-2 gap-4 text-left ml-2">
                    <div>
                      <div class="text-[10px] text-slate-400 font-semibold uppercase">GPA</div>
                      <div id="cumGpa" class="text-4xl font-black text-white tracking-tight">0.00</div>
                    </div>
                    <div>
                      <div class="text-[10px] text-slate-400 font-semibold uppercase">Score</div>
                      <div id="cumPct" class="text-2xl font-bold text-yellow-400 mt-1.5 tracking-tight">0.00%</div>
                    </div>
                  </div>
                  <div id="cumCreditsText" class="text-left ml-2 text-slate-400 text-[10px] mt-2 font-medium">Total Credits: 0</div>
                </div>
              </div>

            </div>
          </div>

          <!-- Friend Comparison Accordion (Standalone Card) -->
          <div class="w-full bg-white border border-slate-200 rounded-xl overflow-hidden transition-all duration-300 shadow-xl mt-6">
            <button onclick="toggleFriend()" class="w-full p-4 flex items-center justify-between text-left focus:outline-none hover:bg-slate-50 transition-colors">
              <div class="flex items-center gap-2">
                <span class="text-lg">🏆</span>
                <span class="font-bold text-sm text-slate-700">Compare with a Friend</span>
              </div>
              <svg id="friendArrow" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-400 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            
            <div id="friendPanel" class="hidden px-4 pb-4 bg-white">
              <div class="space-y-3 pt-3 border-t border-slate-100">
                <input type="text" id="fName" placeholder="Friend's Name" oninput="saveData(); calculateFriend();" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-700 placeholder-slate-400 focus:outline-none focus:border-blue-400 focus:bg-white">
                <div class="grid grid-cols-2 gap-3">
                  <input type="number" id="fGpa" step="0.01" placeholder="Their GPA" oninput="saveData(); calculateFriend();" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-700 placeholder-slate-400 focus:outline-none focus:border-blue-400 focus:bg-white">
                  <input type="number" id="fPct" step="0.01" placeholder="Their Score %" oninput="saveData(); calculateFriend();" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-700 placeholder-slate-400 focus:outline-none focus:border-blue-400 focus:bg-white">
                </div>
                <div id="friendResult" class="text-xs font-bold p-3 rounded-lg mt-2 hidden text-center border"></div>
              </div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </div>

  <script>
    const GRADING_SCALES = {
      standard: {
        points: { "A*": 4.0, "A": 4.0, "A-": 3.6, "B+": 3.3, "B": 3.0, "B-": 2.7, "C+": 2.3, "C": 2.0, "C-": 1.7, "D+": 1.3, "D": 1.0, "F": 0.0, "PE": 0.0, "W": 0.0, "FE": 0.0, "E": 0.0, "I": 0.0 },
        magicSync: [
          { min: 95, grade: 'A*' }, { min: 90, grade: 'A' }, { min: 85, grade: 'A-' },
          { min: 80, grade: 'B+' }, { min: 75, grade: 'B' }, { min: 72, grade: 'B-' },
          { min: 70, grade: 'C+' }, { min: 65, grade: 'C' }, { min: 63, grade: 'C-' },
          { min: 62, grade: 'D+' }, { min: 60, grade: 'D' }, { min: 0, grade: 'F' }
        ]
      },
      dentistry: {
        points: { "A*": 4.0, "A": 4.0, "A-": 3.7, "B+": 3.4, "B": 3.2, "B-": 3.0, "C+": 2.8, "C": 2.6, "C-": 2.4, "D+": 2.2, "D": 2.0, "F": 0.0, "PE": 0.0, "W": 0.0, "FE": 0.0, "E": 0.0, "I": 0.0 },
        magicSync: [
          { min: 90, grade: 'A' }, { min: 85, grade: 'A-' },
          { min: 82, grade: 'B+' }, { min: 78, grade: 'B' }, { min: 75, grade: 'B-' },
          { min: 72, grade: 'C+' }, { min: 68, grade: 'C' }, { min: 65, grade: 'C-' },
          { min: 62.5, grade: 'D+' }, { min: 60, grade: 'D' }, { min: 0, grade: 'F' }
        ]
      }
    };

    let courses = [];
    let currentScaleId = 'standard';
    let friendExpanded = false;

    function init() {
      // Changed to V5 to ensure the new fields load cleanly
      const saved = localStorage.getItem('gpaCalculatorDataV5');
      if (saved) {
        try {
          const data = JSON.parse(saved);
          courses = data.courses || [];
          currentScaleId = data.scale || 'standard';
          document.getElementById('scaleSelector').value = currentScaleId;
          document.getElementById('prevGpa').value = data.prevGpa || '';
          document.getElementById('prevPct').value = data.prevPct || '';
          document.getElementById('prevCredits').value = data.prevCredits || '';
          
          document.getElementById('studentName').value = data.studentName || '';
          updateName();

          document.getElementById('studentRank').value = data.studentRank || '';
          updateRank();

          document.getElementById('studentUniversity').value = data.studentUniversity || '';
          updateUniversity();

          document.getElementById('studentCollege').value = data.studentCollege || '';
          updateCollege();

          document.getElementById('fName').value = data.fName || '';
          document.getElementById('fGpa').value = data.fGpa || '';
          document.getElementById('fPct').value = data.fPct || '';
          
          if (data.fGpa || data.fPct) {
             friendExpanded = true;
             document.getElementById('friendPanel').classList.remove('hidden');
             document.getElementById('friendArrow').classList.add('rotate-180');
          }
        } catch(e) { courses = []; }
      }

      if (courses.length === 0) { addCourse(); addCourse(); addCourse(); }
      
      renderCourses();
      calculate();
      calculateFriend();
    }

    function updateName() {
      const name = document.getElementById('studentName').value;
      const certName = document.getElementById('certName');
      if (name.trim() === '') {
        certName.innerText = "Student Name";
        certName.classList.add("text-slate-300");
        certName.classList.remove("text-slate-900");
      } else {
        certName.innerText = name;
        certName.classList.remove("text-slate-300");
        certName.classList.add("text-slate-900");
      }
    }

    function updateRank() {
      const rank = document.getElementById('studentRank').value.trim();
      const rankText = document.getElementById('certRankText');
      if (rank === '') {
        rankText.classList.add('hidden');
      } else {
        rankText.innerText = `Rank: ${rank}`;
        rankText.classList.remove('hidden');
      }
    }

    function updateUniversity() {
      const uni = document.getElementById('studentUniversity').value.trim();
      const uniText = document.getElementById('certUniversityText');
      if (uni === '') {
        uniText.classList.add('hidden');
      } else {
        uniText.innerText = uni;
        uniText.classList.remove('hidden');
      }
    }

    function updateCollege() {
      const college = document.getElementById('studentCollege').value.trim();
      const collegeText = document.getElementById('certCollegeText');
      if (college === '') {
        collegeText.classList.add('hidden');
      } else {
        collegeText.innerText = college;
        collegeText.classList.remove('hidden');
      }
    }

    function saveData() {
      const data = {
        studentName: document.getElementById('studentName').value,
        studentRank: document.getElementById('studentRank').value,
        studentUniversity: document.getElementById('studentUniversity').value,
        studentCollege: document.getElementById('studentCollege').value,
        courses,
        scale: currentScaleId,
        prevGpa: document.getElementById('prevGpa').value,
        prevPct: document.getElementById('prevPct').value,
        prevCredits: document.getElementById('prevCredits').value,
        fName: document.getElementById('fName').value,
        fGpa: document.getElementById('fGpa').value,
        fPct: document.getElementById('fPct').value,
      };
      localStorage.setItem('gpaCalculatorDataV5', JSON.stringify(data));
    }

    // These functions update the DOM directly so the user doesn't lose typing focus
    function handleNameInput(id, val) {
      const course = courses.find(c => c.id === id);
      if(!course) return;
      
      course.name = val;
      const upper = val.toUpperCase();
      const isExcluded = upper.includes('(E)');
      
      const rowEl = document.getElementById(`course-row-${id}`);
      const checkboxEl = document.getElementById(`include-${id}`);
      const checkVisualEl = document.getElementById(`include-visual-${id}`);

      // Auto-exclude logic
      if (isExcluded && course.included !== false) {
        course.included = false;
        if(checkboxEl) checkboxEl.checked = false;
        toggleRowStyle(rowEl, checkVisualEl, false);
      } else if (!isExcluded && course.included === false && course.name.includes('(E)')) {
        // If they delete the (E)
        course.included = true;
        if(checkboxEl) checkboxEl.checked = true;
        toggleRowStyle(rowEl, checkVisualEl, true);
      }

      saveData(); calculate();
    }

    function handleCreditsInput(id, val) {
      const course = courses.find(c => c.id === id);
      if(course) {
        course.credits = val;
        saveData(); calculate();
      }
    }

    function handlePercentageInput(id, val) {
      const course = courses.find(c => c.id === id);
      if(!course) return;

      course.percentage = val;
      const selectEl = document.getElementById(`grade-select-${id}`);

      if (val === '') {
        course.grade = '';
        if(selectEl) selectEl.value = '';
      } else {
        let pct = parseFloat(val);
        if(!isNaN(pct)) {
          let matched = 'F';
          for(let r of GRADING_SCALES[currentScaleId].magicSync) {
            if(pct >= r.min) { matched = r.grade; break; }
          }
          course.grade = matched;
          if(selectEl) selectEl.value = matched;
        }
      }
      saveData(); calculate();
    }

    function handleGradeSelect(id, val) {
      const course = courses.find(c => c.id === id);
      if(course) {
        course.grade = val;
        saveData(); calculate();
      }
    }

    function handleIncludeToggle(id, checked) {
      const course = courses.find(c => c.id === id);
      if(course) {
        course.included = checked;
        const rowEl = document.getElementById(`course-row-${id}`);
        const checkVisualEl = document.getElementById(`include-visual-${id}`);
        toggleRowStyle(rowEl, checkVisualEl, checked);
        saveData(); calculate();
      }
    }

    function toggleRowStyle(rowEl, checkVisualEl, isIncluded) {
      if(!rowEl || !checkVisualEl) return;
      if (!isIncluded) {
        rowEl.classList.add('bg-slate-50', 'border-slate-200', 'opacity-70');
        rowEl.classList.remove('bg-white', 'shadow-sm', 'sm:border-transparent', 'sm:shadow-none');
        checkVisualEl.classList.add('bg-slate-200', 'text-transparent', 'group-hover:bg-slate-300');
        checkVisualEl.classList.remove('bg-blue-600', 'text-white');
      } else {
        rowEl.classList.remove('bg-slate-50', 'border-slate-200', 'opacity-70');
        rowEl.classList.add('bg-white', 'shadow-sm', 'sm:border-transparent', 'sm:shadow-none');
        checkVisualEl.classList.remove('bg-slate-200', 'text-transparent', 'group-hover:bg-slate-300');
        checkVisualEl.classList.add('bg-blue-600', 'text-white');
      }
    }

    function changeScale(newScale) {
      currentScaleId = newScale;
      
      courses.forEach(c => {
        if (c.percentage !== '') {
           let pct = parseFloat(c.percentage);
           if (!isNaN(pct)) {
             let matched = 'F';
             for(let r of GRADING_SCALES[currentScaleId].magicSync) {
               if(pct >= r.min) { matched = r.grade; break; }
             }
             c.grade = matched;
           }
        }
      });

      saveData();
      renderCourses(); // Re-render needed to update dropdown labels
      calculate();
    }

    function renderCourses() {
      const list = document.getElementById('coursesList');
      list.innerHTML = '';
      
      if(courses.length === 0) {
        list.innerHTML = `<div class="text-center py-8 text-slate-400 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200 font-medium text-sm">No courses added. Click "Add Course" to begin.</div>`;
        return;
      }

      const activePoints = GRADING_SCALES[currentScaleId].points;

      courses.forEach(course => {
        const div = document.createElement('div');
        div.id = `course-row-${course.id}`;
        const isExcluded = course.included === false;
        
        div.className = `fade-in relative flex flex-col sm:grid sm:grid-cols-12 gap-3 items-start sm:items-center p-4 sm:p-2 sm:px-2 rounded-2xl sm:rounded-xl border transition-all ${isExcluded ? 'bg-slate-50 border-slate-200 opacity-70' : 'bg-white border-slate-200 shadow-sm sm:border-transparent sm:shadow-none'}`;
        
        div.innerHTML = `
          <button onclick="removeCourse(${course.id})" class="sm:hidden absolute top-3 right-3 text-slate-300 hover:text-rose-500 p-1"><svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
          
          <div class="w-full sm:col-span-3 pr-8 sm:pr-0">
            <label class="sm:hidden text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 block">Course</label>
            <input type="text" placeholder="e.g. CS101" value="${course.name}" oninput="handleNameInput(${course.id}, this.value)" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-sm font-semibold focus:bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors">
          </div>

          <div class="w-full flex gap-2 sm:contents">
            <div class="flex-1 sm:col-span-2">
              <label class="sm:hidden text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 block">Credits</label>
              <input type="number" min="0" placeholder="e.g. 3" value="${course.credits}" oninput="handleCreditsInput(${course.id}, this.value)" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-center text-sm font-semibold focus:bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors">
            </div>

            <div class="flex-1 sm:col-span-2 relative">
              <label class="sm:hidden text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 block">Score %</label>
              <input type="number" placeholder="%" value="${course.percentage}" oninput="handlePercentageInput(${course.id}, this.value)" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 pr-6 text-center text-sm font-semibold focus:bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors">
              <span class="absolute right-2 top-[50%] sm:top-1/2 sm:-translate-y-1/2 text-slate-400 text-xs font-bold pointer-events-none ${isExcluded ? 'mt-3' : ''} sm:mt-0">%</span>
            </div>

            <div class="flex-[1.5] sm:col-span-3">
              <label class="sm:hidden text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 block">Grade</label>
              <select id="grade-select-${course.id}" onchange="handleGradeSelect(${course.id}, this.value)" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-2 py-2.5 text-sm font-semibold focus:bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none cursor-pointer">
                <option value="" disabled ${!course.grade ? 'selected' : ''}>---</option>
                ${Object.keys(activePoints).map(g => {
                  const label = ["PE","W","FE","E","I"].includes(g) ? g : `${g} (${activePoints[g].toFixed(1)})`;
                  return `<option value="${g}" ${g === course.grade ? 'selected' : ''}>${label}</option>`;
                }).join('')}
              </select>
            </div>
          </div>

          <div class="w-full sm:col-span-2 flex items-center justify-between sm:justify-center mt-2 sm:mt-0 pt-2 sm:pt-0 border-t sm:border-0 border-slate-100">
            <label class="flex items-center gap-2 cursor-pointer group">
              <input type="checkbox" id="include-${course.id}" class="sr-only" ${!isExcluded ? 'checked' : ''} onchange="handleIncludeToggle(${course.id}, this.checked)">
              <div id="include-visual-${course.id}" class="w-5 h-5 rounded flex items-center justify-center transition-colors ${!isExcluded ? 'bg-blue-600 text-white' : 'bg-slate-200 text-transparent group-hover:bg-slate-300'}">
                <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
              <span class="sm:hidden text-xs font-bold text-slate-500">Include</span>
            </label>
            <button onclick="removeCourse(${course.id})" class="hidden sm:block text-slate-300 hover:text-rose-500 p-2 hover:bg-rose-50 rounded-lg transition-colors"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
          </div>
        `;
        list.appendChild(div);
      });
    }

    function addCourse() {
      // New courses now spawn completely empty
      courses.push({ id: Date.now() + Math.random(), name: '', credits: '', percentage: '', grade: '', included: true });
      saveData(); renderCourses(); calculate();
    }

    function removeCourse(id) {
      courses = courses.filter(c => c.id !== id);
      saveData(); renderCourses(); calculate();
    }

    function calculate() {
      const activePoints = GRADING_SCALES[currentScaleId].points;
      let semPoints = 0, semPctPoints = 0, semCredits = 0;

      courses.forEach(c => {
        const cr = parseFloat(c.credits) || 0;
        const gp = activePoints[c.grade] || 0;
        const pct = parseFloat(c.percentage) || 0;
        
        // Blank grades ("") are safely ignored here
        if(cr > 0 && c.grade !== '' && c.included !== false && !["PE","W","FE","E","I"].includes(c.grade)) {
          semPoints += cr * gp;
          semPctPoints += cr * pct;
          semCredits += cr;
        }
      });

      const semGpa = semCredits > 0 ? (semPoints / semCredits) : 0;
      const semPct = semCredits > 0 ? (semPctPoints / semCredits) : 0;

      document.getElementById('semGpa').innerText = semGpa.toFixed(2);
      document.getElementById('semPct').innerText = semPct > 0 ? semPct.toFixed(2) + '%' : '0.00%';
      document.getElementById('semCredits').innerText = `Based on ${semCredits} Credits`;

      // Cumulative Smart Logic
      let rawPrevInput = parseFloat(document.getElementById('prevGpa').value);
      const prevPctText = document.getElementById('prevPct').value.trim();
      const pPct = parseFloat(prevPctText);
      const pCredits = parseFloat(document.getElementById('prevCredits').value);

      let cumGpa = semGpa;
      let cumPct = semPct;
      let totalCredits = semCredits;

      if(!isNaN(pCredits) && pCredits > 0) {
        totalCredits = pCredits + semCredits;
        
        if(!isNaN(rawPrevInput)) {
           let prevPoints = rawPrevInput;
           if(rawPrevInput <= 4.0) prevPoints = rawPrevInput * pCredits; 
           
           cumGpa = (prevPoints + semPoints) / totalCredits;
           if(cumGpa > 4.0) cumGpa = 4.0; 
        }

        if(prevPctText === "") {
           cumPct = NaN; 
        } else if(!isNaN(pPct)) {
           cumPct = ((pPct * pCredits) + semPctPoints) / totalCredits;
        }
      }

      document.getElementById('cumGpa').innerText = isNaN(cumGpa) ? "0.00" : cumGpa.toFixed(2);
      document.getElementById('cumPct').innerText = isNaN(cumPct) ? "N/A" : cumPct.toFixed(2) + '%';
      document.getElementById('cumCreditsText').innerText = `Total Credits: ${totalCredits}`;
      
      checkHonors(cumGpa, totalCredits);
      calculateFriend();
    }

    let hasCelebrated = false;

    function checkHonors(gpa, credits) {
      const certBorder = document.getElementById('certBorder');
      const standingText = document.getElementById('standingText');
      
      // If GPA is 3.85 or higher (Excellent / Summa Cum Laude)
      if (gpa >= 3.85 && credits > 0) {
        certBorder.classList.add('certificate-honors');
        standingText.innerText = "🏆 Excellent with Honors";
        standingText.classList.remove('text-slate-400');
        standingText.classList.add('text-yellow-600');
        
        if (!hasCelebrated) {
          if (typeof confetti !== 'undefined') {
            confetti({
              particleCount: 150,
              spread: 80,
              origin: { y: 0.6 },
              colors: ['#fbbf24', '#f59e0b', '#3b82f6', '#1e293b']
            });
          }
          hasCelebrated = true;
        }
      } else {
        // Reset if GPA drops below 3.85
        certBorder.classList.remove('certificate-honors');
        standingText.innerText = "Academic Standing";
        standingText.classList.remove('text-yellow-600');
        standingText.classList.add('text-slate-400');
        hasCelebrated = false; // Allow celebration to trigger again later if they go back up!
      }
    }

    function toggleFriend() {
      friendExpanded = !friendExpanded;
      document.getElementById('friendPanel').classList.toggle('hidden', !friendExpanded);
      document.getElementById('friendArrow').classList.toggle('rotate-180', friendExpanded);
    }

    function calculateFriend() {
      const fGpa = parseFloat(document.getElementById('fGpa').value);
      const fPct = parseFloat(document.getElementById('fPct').value);
      const res = document.getElementById('friendResult');
      
      const myGpa = parseFloat(document.getElementById('cumGpa').innerText);
      const myPct = parseFloat(document.getElementById('cumPct').innerText);

      if(isNaN(fGpa) && isNaN(fPct)) {
        res.classList.add('hidden');
        return;
      }

      let text = '';
      if(!isNaN(fGpa) && !isNaN(myGpa) && myGpa > 0) {
        const diff = Math.abs(myGpa - fGpa).toFixed(2);
        if(myGpa > fGpa) text = `🔥 You are leading by ${diff} GPA points!`;
        else if (fGpa > myGpa) text = `💪 They are ahead by ${diff} GPA points. Catch up!`;
        else text = `🤝 You both have the exact same GPA!`;
      } else if (!isNaN(fPct) && !isNaN(myPct)) {
        const diff = Math.abs(myPct - fPct).toFixed(2);
        if(myPct > fPct) text = `🔥 You are leading by ${diff}%!`;
        else if (fPct > myPct) text = `💪 They are ahead by ${diff}%. Catch up!`;
      }

      if(text) {
        res.innerText = text;
        res.classList.remove('hidden', 'bg-emerald-50', 'text-emerald-700', 'border-emerald-200', 'bg-rose-50', 'text-rose-700', 'border-rose-200', 'bg-blue-50', 'text-blue-700', 'border-blue-200');
        
        if (text.includes('leading')) {
            res.classList.add('bg-emerald-50', 'text-emerald-700', 'border-emerald-200');
        } else if (text.includes('ahead')) {
            res.classList.add('bg-rose-50', 'text-rose-700', 'border-rose-200');
        } else {
            res.classList.add('bg-blue-50', 'text-blue-700', 'border-blue-200');
        }
      }
    }

    // Start App
    window.onload = init;
  </script>
</body>
</html>
